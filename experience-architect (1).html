<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Experience Architect</title>
<style>
  :root {
    --parchment: #F6F0E4; --parchment-deep: #EFE6D3;
    --gold: #C9A24B; --gold-soft: #DEC086;
    --cloak: #4F6B78; --cloak-deep: #35505C;
    --forest: #33463A; --ink: #2B2620; --ink-soft: #6B6255;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Georgia, 'Iowan Old Style', serif;
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment-deep) 100%);
    color: var(--ink); min-height: 100vh; padding: 32px 16px 80px;
  }
  .wrap { max-width: 780px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  .kicker { letter-spacing: 3px; text-transform: uppercase; font-size: 11px; color: var(--cloak-deep); opacity: 0.75; }
  h1 { font-size: 32px; margin: 10px 0 6px; color: var(--forest); font-weight: normal; }
  h1 em { font-style: italic; color: var(--gold); }
  .tagline { color: var(--ink-soft); font-size: 14px; font-style: italic; }

  .toprow { display: flex; justify-content: center; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .toplink { background: none; border: none; color: var(--cloak-deep); text-decoration: underline; cursor: pointer; font-family: Georgia, serif; font-size: 13px; padding: 0; }
  .autosave-note { text-align: center; font-size: 11.5px; color: var(--ink-soft); font-style: italic; margin-bottom: 22px; }

  .card {
    background: rgba(255,255,255,0.55); border: 1px solid rgba(79,107,120,0.2);
    border-radius: 14px; padding: 26px 28px; margin-bottom: 22px; box-shadow: 0 2px 10px rgba(43,38,32,0.05);
  }
  .card h2 {
    font-size: 15px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--cloak-deep);
    margin: 0 0 18px; font-weight: normal; border-bottom: 1px solid rgba(79,107,120,0.2); padding-bottom: 10px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .card h2 .note { text-transform: none; letter-spacing: 0; color: var(--ink-soft); font-size: 12.5px; }
  label { display: block; font-size: 14.5px; color: var(--forest); margin-bottom: 6px; font-weight: bold; }
  textarea, input[type=text], select {
    width: 100%; font-family: inherit; font-size: 14.5px; color: var(--ink);
    background: #FCFAF4; border: 1px solid rgba(79,107,120,0.3); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 18px; resize: vertical;
  }
  textarea:focus, input:focus, select:focus { outline: 2px solid var(--gold-soft); }
  .field { margin-bottom: 4px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 200px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .chip { padding: 7px 13px; border-radius: 999px; border: 1px solid var(--cloak); font-size: 13px; cursor: pointer; background: #fff; color: var(--cloak-deep); user-select: none; }
  .chip.on { background: var(--cloak); color: #fff; }

  .surprise-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; font-size: 13.5px; color: var(--forest); }

  button.primary {
    display: block; width: 100%; padding: 15px; margin-top: 8px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-soft) 100%);
    color: var(--forest); font-family: Georgia, serif; font-size: 16px; font-weight: bold;
    border: none; border-radius: 10px; cursor: pointer; letter-spacing: 0.5px;
  }
  button.primary:disabled, button.secondary:disabled, button.tiny:disabled { opacity: 0.45; cursor: not-allowed; }
  button.secondary {
    padding: 9px 16px; background: #fff; border: 1px solid var(--cloak); color: var(--cloak-deep);
    border-radius: 8px; font-family: Georgia, serif; font-size: 13px; cursor: pointer; margin: 5px 6px 0 0;
  }
  button.secondary:hover:not(:disabled) { background: var(--cloak); color: #fff; }
  button.tiny {
    padding: 5px 10px; background: #fff; border: 1px solid rgba(79,107,120,0.4); color: var(--cloak-deep);
    border-radius: 6px; font-family: Georgia, serif; font-size: 11.5px; cursor: pointer; margin-left: 6px;
  }
  button.tiny:hover:not(:disabled) { background: var(--parchment-deep); }
  button.danger { color: #8A4B3E; border-color: #8A4B3E; }
  button.linkback { background: none; border: none; color: var(--cloak-deep); text-decoration: underline; cursor: pointer; font-family: Georgia, serif; font-size: 13.5px; padding: 0; margin-bottom: 14px; }

  .loading { text-align: center; padding: 26px 0; color: var(--ink-soft); font-style: italic; }
  .dot { animation: pulse 1.4s infinite ease-in-out; display:inline-block; }
  @keyframes pulse { 0%,100%{opacity:.3;} 50%{opacity:1;} }
  .progress-note { font-size: 12px; color: var(--gold); margin-top: 4px; }
  .savenote { text-align: center; font-size: 12px; color: var(--cloak-deep); font-style: italic; margin: -8px 0 18px; opacity: 0.9; }

  .concept { border: 1px solid rgba(79,107,120,0.25); border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; background: #FFFDF7; }
  .concept h3 { margin: 0 0 4px; color: var(--forest); font-size: 20px; }
  .promise { font-style: italic; color: var(--cloak-deep); margin-bottom: 12px; font-size: 14.5px; }
  .concept dl { margin: 0; }
  .concept dt { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-top: 12px; font-weight: bold; }
  .concept dd { margin: 3px 0 0; font-size: 14px; line-height: 1.5; }
  .new-flag { margin-top: 12px; background: rgba(201,162,75,0.15); border-left: 3px solid var(--gold); padding: 8px 12px; font-size: 12.5px; font-style: italic; border-radius: 4px; }

  .outline-block { white-space: pre-wrap; font-size: 14.5px; line-height: 1.7; }
  .outline-block h4 { color: var(--forest); font-size: 15px; margin: 18px 0 6px; }

  .inputs-panel { margin-top: -6px; margin-bottom: 22px; }
  .inputs-panel summary { cursor: pointer; font-size: 12.5px; color: var(--cloak-deep); text-decoration: underline; }
  .inputs-panel .inner { margin-top: 12px; }

  .expansions { margin-top: 22px; padding-top: 18px; border-top: 1px dashed rgba(79,107,120,0.3); }
  .expansions .group-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); margin: 14px 0 6px; }
  .expansions .group-label:first-child { margin-top: 0; }

  .expansion-result { margin-top: 14px; background: #FCFAF4; border: 1px solid rgba(79,107,120,0.2); border-radius: 10px; padding: 16px 18px; font-size: 14px; white-space: pre-wrap; line-height: 1.65; }
  .expansion-result h5 { margin: 0 0 8px; color: var(--cloak-deep); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }

  .outline-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 16px; }

  .session-item { border: 1px solid rgba(79,107,120,0.25); border-radius: 10px; padding: 14px 18px; margin-bottom: 12px; background: #FFFDF7; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .session-item .title { color: var(--forest); font-size: 15.5px; margin-bottom: 3px; }
  .session-item .date { color: var(--ink-soft); font-size: 12px; font-style: italic; }
  .empty { text-align: center; color: var(--ink-soft); font-style: italic; padding: 30px 0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(43,38,32,0.55); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
  .modal-box { background: var(--parchment); border-radius: 14px; padding: 24px; max-width: 600px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
  .modal-box h3 { margin: 0 0 4px; color: var(--forest); }
  .modal-box .hint { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 12px; }
  .modal-box textarea { flex: 1; min-height: 260px; font-size: 13px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

  footer { text-align: center; color: var(--ink-soft); font-size: 12px; margin-top: 40px; font-style: italic; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const INGREDIENTS = [
  "Guided hypnosis","Reflective Self-Hypnosis™","Body Dialogue Method™","Post-hypnotic suggestion",
  "NLP anchors","Environmental anchors","Symbolic anchors","Somatic awareness","Reflective inquiry",
  "Mindfulness","Visualization","Metaphor","Storytelling","AI-guided reflection","Community dialogue",
  "Journaling","Companion artifact"
];

const SYSTEM_PROMPT = `You are Tina Shafer's private Transformational Experience Architect, a creative design partner (Version 1, scoped to The Practice of Self-Return™ and capacity-expansion work).

GUIDING PHILOSOPHY (hold this above everything else):
The Experience Architect is not a content generator. It is a transformational experience designer. Every output should preserve the philosophy that participants learn through embodied experience, repeated practice, and reflection, not information alone. The goal is not to invent new methods but to thoughtfully orchestrate the existing body of work into meaningful experiences that continue beyond the workshop itself.

CURRENT SIGNATURE OFFER IN SCOPE — Journey to the Center of You: A Return to Choice
(This section is specific to Tina's current signature offer, not a permanent universal truth. A future offer will have its own North Star, Crossroads Portrait, and Milestones. When that happens this section gets replaced, not stacked on top of.)

THE NORTH STAR (fixed for this offer, do not rephrase or paraphrase away from):
"She no longer waits for certainty before she acts."
This is the destination this offer's experiences should ultimately serve, even indirectly. Nothing generated for this offer should contradict it or quietly promise something else instead (permanent calm, guaranteed outcomes, certainty about the future). Underneath it: she stops needing certainty about the outcome, because she builds certainty in herself.

MISSION STATEMENT: "I help people build the capacity to return to choice before automatic patterns complete, so they no longer wait for certainty before they act."

WHO SHE IS (Crossroads Portrait, compressed): A capable, self-aware woman, often a coach, healer, nurse, therapist, or entrepreneur, who has already done real inner work: therapy, books, meditation, sometimes for years. She can explain her own patterns fluently and still can't interrupt them in the moment. It's never the big crisis that undoes her, it's something small enough she can't explain away, which is exactly what tells her the problem was never the situation. She catches herself saying yes when she meant no, only realizing after. She's carrying more than one person should carry, with little space that's actually hers. She believes she has to have it together before she's allowed to get help, and reads her own struggle as failure rather than a missing piece. She believes if she stops managing everything, it will fall apart, because once, it did. What she wants isn't just relief from the noise, it's trust in herself under real pressure, and permission to stop needing certainty before she acts.

SUCCESS PATH MILESTONES for this offer (know roughly where in this arc a given experience is meant to land someone): 1) She recognizes the pattern while it's happening, not just in hindsight. 2) She catches it sooner, closer to the trigger. 3) She discovers she has a choice, even if she doesn't take it yet. 4) She practices returning to choice on purpose, as rehearsal, before life demands it. 5) She returns to choice in one real high-stakes moment, and it holds. 6) Her recovery gets shorter. 7) She acts before certainty, in one specific domain of her life. 8) She chooses this response more often than the old pattern, across different areas of her life.

THE ENGINE — the Dynamic System for Inner Change:
Treat this as the underlying theory of transformation, like laws of nature, not a script to reproduce mechanically. Sequencing principles that should quietly inform every design without dictating a fixed structure: safety precedes change, non-interference precedes insight, capacity precedes complexity, regulation precedes meaning. Never force every experience into an identical sequence of steps.

THE METHOD — The Return Method™:
The mechanism layer, sitting between the Engine (why change happens) and the World (how it's experienced). The Return Method coordinates the systems that create human experience, rather than treating any one part of a person (thoughts, beliefs, emotions, nervous system, behavior) as the whole problem. It is built through a daily embodied practice called The Practice of Self-Return™, where people repeatedly return to choice before an automatic pattern completes.

Three-layer architecture, each layer doing one job: Framework (explains why change happens) is the Dynamic System of Inner Change. Method (explains how change happens) is The Return Method™. Daily Practice (what someone actually, repeatedly does) is The Practice of Self-Return™. This layering exists specifically so Self-Return doesn't have to carry the whole framework by itself. Self-Return is one expression of Return, not the entirety of it. When designing an experience, know which layer it's serving: an experience can teach the Method's mechanism, or it can BE the daily practice, but conflating the two overloads the practice again.

THE WORLD — The Mindful Heart Journey™:
The experiential wrapper: language, imagery, symbolism, metaphor, story, atmosphere. NOT a second set of mechanics. It should evolve organically. If a concept gives rise to something not already established, flag it clearly as new/proposed.

SELF-RETURN SYMBOLIC VOCABULARY (draw on naturally, don't force into every concept):
Return is the practice of coming back to choice. Return to Stillness names what it feels like (the experiential name); Return to Choice names what it accomplishes (the functional name). Both describe the same movement, not two sequential steps. The felt sequence within a single moment of return: Recognize the pattern beginning, Return, arrive at choice, already available, not a separate destination reached afterward. "Check In → Find Your Footing → Choose." The Hallway of Doors, and the Crossroads with two roads (the familiar road, the road less traveled) and reflecting pools where recognition happens without judgment. Environmental anchors: doorknobs, doorways, steering wheel, Zoom login. Internal anchors: feet, breath, thumb-finger contact, shoulders. "There it is." "One moment at a time." Practice expands capacity. Expanded capacity changes how you respond. The gap between trigger and response is evidence of expanded capacity. Self-Return isn't the destination. It's the practice that builds the capacity.

VOICE: Warm, plain-spoken, body-aware, unhurried. No em dashes, ever. No hype, no urgency language, no "unlock/unleash" marketing voice. Short sentences. Concrete, sensory language over abstraction. Every output should sound like it could be read aloud slowly and land softly, an exhale, not a pitch.

HARD RULE: never write actual hypnotic induction or trance-deepening script language. Wherever a guided induction would go, write exactly: "[Guided induction of choice goes here — Tina writes this in her own voice]" and move on.

INGREDIENTS, NOT A LIBRARY: guided hypnosis, Reflective Self-Hypnosis™, Body Dialogue Method™, post-hypnotic suggestion, NLP anchors, environmental anchors, symbolic anchors, somatic awareness, reflective inquiry, mindfulness, visualization, metaphor, storytelling, AI-guided reflection, community dialogue, journaling, companion artifacts. Every experience should have a clear HEART, one or two ingredients that are the center of gravity, everything else in support.

FORMAT: LIVE VS RECORDED (this changes real design decisions, not just labeling):
Live experiences can read the room. A facilitator adjusts pacing, silence, and depth in real time based on what she sees. Recorded, solo, on-demand experiences cannot do this, and must be designed differently, not just shortened:
- Pacing must be fixed in advance. Build in specific pause lengths spoken aloud by the voice track itself ("Take the next thirty seconds with that.") rather than relying on a live facilitator's judgment.
- Any beat that depends on another person in the room (small group witnessing, being heard aloud by someone else, live Q&A) cannot appear as-is. Either redesign it as a solo equivalent (private journaling, a solo spoken-aloud practice, a written reflection she keeps for herself) or name clearly that this beat is intentionally omitted and why.
- A recorded first-time hypnotic or reflective experience needs more orientation up front than a live one would, not less, since there is no facilitator present to notice if she is confused, overwhelmed, or unsure how to come back to herself. Always include a brief spoken orientation before the first guided induction: what she'll experience, that she stays in control the whole time, and how to end the practice early if she needs to.
- The Facilitator Guide continuation does not apply to recorded formats. If format is recorded, that continuation option should be treated as a Voice Track Script instead, written as the actual words to be spoken/recorded, still honoring the hard rule that real induction language is replaced with the bracketed placeholder.
- Companion artifacts and Passport integration still apply fully to recorded formats.


- Physical Companion: a take-home object, touched not talked to (example: a small card, an anchor object).
- Reflective Mirror™: a voice-first reflective experience immediately following the workshop, while the nervous system is still carrying it. Purpose is to capture, reflect, and preserve what was already discovered, never to teach, coach, or interpret. Produces a keepsake worth saving.
- AI Companion: an ongoing conversation partner someone returns to over days or weeks.
- Daily Practice: a short repeatable ritual that extends the experience into ordinary life.
- Passport: a stamp or milestone marking this threshold crossed.
- Community Conversation: a shared, witnessed exchange with other participants, no coaching or interpretation, just naming and being heard.

COMPLETENESS RULE: Every field you output must be fully written, real content. Never write "see below," "as above," or any placeholder that refers to content you have not actually written in that same response. If a field doesn't apply, write "None needed" or "Not applicable" rather than leaving it incomplete or deferred.

CONCEPT DIVERSITY RULE: When generating 3 concepts, make their hearts genuinely different centers of gravity, for example one hypnosis-led, one somatic-led, one community-led, not three variations of the same idea.

If reference material is provided, draw from it naturally, echo its language and specifics where relevant, don't just summarize it back.

Be concise. Output only what is asked, no preamble, no closing remarks, no markdown symbols, use the exact structure requested.`;

// ---------- API key (session-only, never in code) ----------
function getApiKey() {
  let apiKey = sessionStorage.getItem('ea_api_key');
  if (!apiKey) {
    apiKey = prompt('Enter your Anthropic API key:\n(Stored for this browser session only — never saved to the page code)');
    if (apiKey) sessionStorage.setItem('ea_api_key', apiKey);
  }
  return apiKey;
}
function clearApiKey() { sessionStorage.removeItem('ea_api_key'); }

// ---------- API with auto-continuation ----------
async function callClaudeRaw(messages) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error("No API key entered.");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system: SYSTEM_PROMPT, messages })
  });
  const d = await r.json();
  if (d.error) {
    if (/authentication|api key|invalid x-api-key/i.test(d.error.message || "")) clearApiKey();
    throw new Error(d.error.message || "API error");
  }
  const text = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  return { text, stopReason: d.stop_reason };
}

async function callClaude(userPrompt, onProgress) {
  let messages = [{ role: "user", content: userPrompt }];
  let full = "";
  for (let i = 0; i < 4; i++) {
    const { text, stopReason } = await callClaudeRaw(messages);
    full += text;
    if (stopReason !== "max_tokens") break;
    if (onProgress) onProgress(i + 2);
    messages = [
      { role: "user", content: userPrompt },
      { role: "assistant", content: full },
      { role: "user", content: "Continue exactly where you left off. Do not repeat anything already written. Do not restart the structure." }
    ];
  }
  return full;
}

// ---------- storage helpers (browser localStorage) ----------
function getIndex() {
  try { const raw = localStorage.getItem('ea_sessions-index'); return raw ? JSON.parse(raw) : []; }
  catch (e) { return []; }
}
function saveIndexEntry(entry) {
  const idx = getIndex();
  const pos = idx.findIndex(x => x.id === entry.id);
  if (pos >= 0) idx[pos] = entry; else idx.unshift(entry);
  try { localStorage.setItem('ea_sessions-index', JSON.stringify(idx)); } catch(e) {}
}
function removeIndexEntry(id) {
  const idx = getIndex();
  try { localStorage.setItem('ea_sessions-index', JSON.stringify(idx.filter(x => x.id !== id))); } catch(e) {}
}
function persistSession() {
  if (!state.sessionId) return;
  const session = {
    id: state.sessionId, createdAt: state.sessionCreatedAt,
    title: state.selectedConcept ? state.selectedConcept.name : (state.inputs.transformation.slice(0,60) || "Untitled experience"),
    inputs: state.inputs, concepts: state.concepts, selectedConcept: state.selectedConcept,
    outline: state.outline, expansions: state.expansions
  };
  try {
    localStorage.setItem('ea_session:' + state.sessionId, JSON.stringify(session));
    saveIndexEntry({ id: session.id, title: session.title, createdAt: session.createdAt, updatedAt: Date.now() });
    state.savedFlash = true; render();
    setTimeout(() => { state.savedFlash = false; render(); }, 2200);
  } catch(e) {}
}
function loadSession(id) {
  try { const raw = localStorage.getItem('ea_session:' + id); return raw ? JSON.parse(raw) : null; }
  catch(e) { return null; }
}
function deleteSessionById(id) {
  try { localStorage.removeItem('ea_session:' + id); } catch(e) {}
  removeIndexEntry(id);
}

// ---------- text export + robust copy/download ----------
function conceptToText(c) {
  return `${c.name}\n\nPromise: ${c.promise}\nHeart: ${c.heart}\nArc: ${c.arc}\nCompanion: ${c.companion}\nPossible Passport Stamp: ${c.stamp}\nWhy This Works: ${c.why}`;
}
function fullOutlineToText() {
  const c = state.selectedConcept, o = state.outline;
  let out = `${c.name}\n\nPromise: ${c.promise}\nHeart: ${c.heart}\n\nTIMING\n${o.timing}\n\nEXPERIENCE FLOW\n${o.flow}\n\nPARTICIPANT EXPERIENCE\n${o.participant}\n\nCOMPANION ARTIFACT\n${o.companion}\n\nPASSPORT INTEGRATION\n${o.passport}`;
  Object.keys(state.expansions).forEach(key => {
    const def = EXPANSIONS.find(e => e.key === key);
    out += `\n\n--- ${(def ? def.label : key).toUpperCase()} ---\n${state.expansions[key].replace(/<br>/g, "\n")}`;
  });
  return out;
}
function openTextModal(title, text) {
  state.modal = { title, text };
  render();
  setTimeout(() => {
    const ta = document.getElementById("modalTextarea");
    if (ta) { ta.focus(); ta.select(); }
    navigator.clipboard && navigator.clipboard.writeText(text).catch(()=>{});
  }, 0);
}
function downloadText(filename, text) {
  try {
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {}
  openTextModal("Your Text (in case the download didn't start)", text);
}

// ---------- state ----------
let state = {
  screen: "form",
  inputs: { transformation:"", threshold:"", journeyPlace:"", who:"", length:"75", format:"live", heart:"", ingredients:[], companion:"", surprise:false, referenceMaterial:"" },
  loading: false, loadingMsg: "",
  concepts: null, selectedConcept: null, outline: null, expansions: {},
  sessionId: null, sessionCreatedAt: null, savedFlash: false,
  savedSessions: [], sessionsLoading: false,
  modal: null
};

function newSessionId() { return 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

function render() {
  const el = document.getElementById("app");
  el.innerHTML = `
    <header>
      <div class="kicker">Soul Growth Studio · Private · v1</div>
      <h1>Experience <em>Architect</em></h1>
      <div class="tagline">Built on the Dynamic System · Voiced in the Mindful Heart Journey</div>
    </header>
    <div class="toprow" id="toprow"></div>
    <div class="autosave-note">🕯️ Everything you build here saves automatically</div>
    <div id="content"></div>
    <footer>The engine transforms. The world invites. This stays yours. 🕯️</footer>
  `;
  const top = document.getElementById("toprow");
  if (state.screen !== "sessions") {
    const b = document.createElement("button"); b.className = "toplink"; b.textContent = "📜 Your Saved Experiences"; b.onclick = openSessions; top.appendChild(b);
  }
  if (state.screen !== "form") {
    const b2 = document.createElement("button"); b2.className = "toplink"; b2.textContent = "✦ Start a New Experience"; b2.onclick = resetToForm; top.appendChild(b2);
  }
  const b3 = document.createElement("button"); b3.className = "toplink"; b3.textContent = "🔑 Change API Key"; b3.onclick = () => { clearApiKey(); alert("Key cleared. You'll be asked to enter it again next time you generate."); }; top.appendChild(b3);
  const c = document.getElementById("content");
  if (state.screen === "form") c.appendChild(renderForm());
  else if (state.screen === "concepts") c.appendChild(renderConcepts());
  else if (state.screen === "outline") c.appendChild(renderOutline());
  else if (state.screen === "sessions") c.appendChild(renderSessions());

  if (state.modal) {
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-box">
        <h3>${state.modal.title}</h3>
        <div class="hint">Selected and copied automatically where possible. If it didn't copy, press Ctrl/Cmd+C now.</div>
        <textarea id="modalTextarea" readonly>${state.modal.text}</textarea>

    `;

  }
}

function buildConceptPrompt(inp) {
  const refBlock = inp.referenceMaterial.trim()
    ? `\n\nReference material to draw from (use naturally, echo specifics, don't just repeat it back):\n${inp.referenceMaterial.trim().slice(0,6000)}`
    : "";
  return `Generate exactly 3 distinct transformational experience concepts for a ${inp.length}-minute ${inp.format === "recorded" ? "recorded, solo, on-demand" : "live"} experience.
${inp.format === "recorded" ? "This is a RECORDED format. Apply the FORMAT: LIVE VS RECORDED guidance fully — no beat should depend on another person being physically present, and pacing must be fixed in advance rather than adaptive." : ""}

Transformation/shift being supported: ${inp.transformation}
Crossroads/threshold participants are standing at: ${inp.threshold}
Where this belongs in the larger journey: ${inp.journeyPlace || "not specified"}
Who it's for: ${inp.who || "not specified"}
Heart of the experience (if given): ${inp.heart || "not specified — propose one per concept, and make the three genuinely different centers of gravity"}
Ingredients to consider: ${inp.ingredients.length ? inp.ingredients.join(", ") : "fully open, choose freely"}
Companion artifact: ${inp.surprise ? "surprise me" : (inp.companion || "propose one if it genuinely serves the experience, otherwise write None needed")}${refBlock}

For each of the 3 concepts, output in this exact plain text structure (no markdown symbols), every field fully written with real content, no placeholders:

CONCEPT [number]: [Experience Name]
PROMISE: [one sentence]
HEART: [what is the heart of this experience]
ARC: [2-3 sentences on the overall arc/shape]
COMPANION: [fully describe the suggested companion artifact, or write "None needed"]
STAMP: [possible Passport stamp or milestone, or "None yet"]
WHY: [1-2 sentences on why this works]
NEW: [if this introduces something not already part of Tina's established world, name it in one line starting with "This introduces..." — otherwise write "Nothing new — draws on established language"]`;
}

async function generateConcepts(wrap) {
  collectInputs(wrap);
  if (!state.inputs.transformation.trim() || !state.inputs.threshold.trim()) {
    alert("The transformation and the threshold are the two things I really need to begin.");
    return;
  }
  state.loading = true; state.loadingMsg = "Sketching three concepts…"; render();

  try {
    let result = await callClaude(buildConceptPrompt(state.inputs), (part) => {
      state.loadingMsg = `Still writing (part ${part})…`; render();
    });
    let concepts = parseConcepts(result);
    const gaps = findConceptGaps(concepts);
    if (gaps.length) {
      state.loadingMsg = "Filling in a few missing details…"; render();
      const repaired = await repairConcepts(concepts, gaps, state.inputs);
      concepts = repaired;
    }
    state.concepts = concepts;
    state.loading = false; state.screen = "concepts";
    state.sessionId = newSessionId(); state.sessionCreatedAt = Date.now();
    render();
    persistSession();
  } catch (e) {
    state.loading = false;
    alert("Something went wrong generating concepts. Try again.");
    render();
  }
}

function parseConcepts(text) {
  const blocks = text.split(/CONCEPT\s*\d+:/i).filter(b => b.trim());
  return blocks.map(block => {
    const get = (label) => {
      const re = new RegExp(label + ":\\s*([\\s\\S]*?)(?=\\n[A-Z]+:|$)", "i");
      const m = block.match(re);
      return m ? m[1].trim() : "";
    };
    const nameMatch = block.match(/^(.*?)\n/);
    return {
      name: nameMatch ? nameMatch[1].trim() : "Untitled Concept",
      promise: get("PROMISE"), heart: get("HEART"), arc: get("ARC"),
      companion: get("COMPANION"), stamp: get("STAMP"), why: get("WHY"), isNew: get("NEW")
    };
  });
}

function findConceptGaps(concepts) {
  const required = ["promise","heart","arc","companion","stamp","why"];
  const gaps = [];
  concepts.forEach((c, i) => {
    required.forEach(f => {
      const val = (c[f] || "").trim();
      if (!val || /^see below$/i.test(val) || /^as above$/i.test(val)) gaps.push({ index: i, field: f, name: c.name });
    });
  });
  return gaps;
}

async function repairConcepts(concepts, gaps, inp) {
  const gapList = gaps.map(g => `Concept "${g.name}" is missing: ${g.field.toUpperCase()}`).join("\n");
  const prompt = `The following experience concepts have incomplete fields. Write complete, real content for exactly these missing fields, no placeholders, no "see below."

Context — transformation: ${inp.transformation}
Threshold: ${inp.threshold}
Length: ${inp.length} minutes

Concepts so far:
${concepts.map(c => `${c.name} — heart: ${c.heart || "(missing)"}, arc: ${c.arc || "(missing)"}`).join("\n")}

Missing fields to fill:
${gapList}

Output in this exact format, one line per missing field:
CONCEPT NAME | FIELD | content`;
  try {
    const result = await callClaude(prompt);
    const lines = result.split("\n").filter(l => l.includes("|"));
    lines.forEach(line => {
      const parts = line.split("|").map(p => p.trim());
      if (parts.length < 3) return;
      const [name, field, ...rest] = parts;
      const content = rest.join("|").trim();
      const target = concepts.find(c => c.name === name);
      if (target) target[field.toLowerCase()] = content;
    });
  } catch(e) {}
  return concepts;
}

function buildOutlinePrompt(concept, inp) {
  return `Develop this chosen concept into a facilitator outline for a ${inp.length}-minute ${inp.format === "recorded" ? "recorded, solo, on-demand" : "live"} experience. ${inp.format === "recorded" ? "Apply the FORMAT: LIVE VS RECORDED guidance — fixed pacing, no live-only beats, extra up-front orientation." : ""} Do not write a full script or any induction language, outline only, in Tina's own voice, concise, every field fully written with no placeholders.

Concept: ${concept.name}
Promise: ${concept.promise}
Heart: ${concept.heart}
Arc: ${concept.arc}
Companion: ${concept.companion}
Stamp: ${concept.stamp}

Output in this exact plain text structure:

TIMING: [rough timing breakdown by section]
FLOW: [the experience flow as facilitator beats, in order, each beat one short line]
PARTICIPANT EXPERIENCE: [2-3 sentences describing what it feels like from the inside, in Tina's voice]
COMPANION ARTIFACT: [what it is and how it extends the experience, or "None needed"]
PASSPORT INTEGRATION: [how this connects to the Passport, or "Standalone — no Passport tie yet"]`;
}

async function developConcept(concept) {
  state.selectedConcept = concept;
  state.loading = true; state.loadingMsg = "Building the facilitator outline…"; render();
  try {
    const result = await callClaude(buildOutlinePrompt(concept, state.inputs), (part) => {
      state.loadingMsg = `Still writing (part ${part})…`; render();
    });
    state.outline = parseOutline(result);
    state.loading = false; state.screen = "outline"; render();
    persistSession();
  } catch (e) {
    state.loading = false;
    alert("Something went wrong building the outline. Try again.");
    render();
  }
}

function parseOutline(text) {
  const get = (label) => {
    const re = new RegExp(label + ":\\s*([\\s\\S]*?)(?=\\n[A-Z][A-Z ]+:|$)", "i");
    const m = text.match(re);
    return m ? m[1].trim() : "";
  };
  return { timing: get("TIMING"), flow: get("FLOW"), participant: get("PARTICIPANT EXPERIENCE"), companion: get("COMPANION ARTIFACT"), passport: get("PASSPORT INTEGRATION") };
}

const EXPANSIONS = [
  { key: "physical", label: "Physical Companion", group: "Experience Continuations" },
  { key: "reflectivemirror", label: "Reflective Mirror™", group: "Experience Continuations",
    guidance: "This is a voice-first reflective experience that happens immediately after the workshop, while the nervous system is still carrying it. It must capture, reflect, and preserve what the participant already discovered, never teach, coach, or interpret. Include: 3-5 voice-first reflective prompts (questions meant to be spoken aloud, not typed), and a description of what the resulting keepsake looks like." },
  { key: "aicompanion", label: "AI Companion", group: "Experience Continuations" },
  { key: "dailypractice", label: "Daily Practice", group: "Experience Continuations",
    guidance: "A short, repeatable ritual, under 5 minutes, that someone could do daily to extend this experience into ordinary life." },
  { key: "passport", label: "Passport Page", group: "Experience Continuations" },
  { key: "community", label: "Community Conversation", group: "Experience Continuations",
    guidance: "A prompt for a shared, witnessed exchange with other participants (in Skool or live). No coaching or interpretation, just naming and being heard." },
  { key: "facilitator", label: "Facilitator Guide", group: "Deepen the Design" },
  { key: "workbook", label: "Participant Workbook Pages", group: "Deepen the Design" },
  { key: "hypnosis", label: "Guided Hypnosis Outline", group: "Deepen the Design" },
  { key: "skool", label: "Skool Experience", group: "Deepen the Design" },
  { key: "retreat", label: "Retreat Version", group: "Deepen the Design" }
];

function renderOutline() {
  const wrap = document.createElement("div");
  const back = document.createElement("button");
  back.className = "linkback"; back.textContent = "← Back to the three directions";
  back.onclick = () => { state.screen = "concepts"; render(); };
  wrap.appendChild(back);

  if (state.savedFlash) { const s = document.createElement("div"); s.className = "savenote"; s.textContent = "🕯️ Saved"; wrap.appendChild(s); }

  const c = state.selectedConcept, o = state.outline;
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2>${c.name}</h2>
    <details class="inputs-panel"><summary>View or edit the inputs behind this experience</summary>
      <div class="inner">
        <label>Reference material</label>
        <textarea id="editRef" rows="5">${state.inputs.referenceMaterial}</textarea>
        <button class="tiny" id="saveRef">Save Changes</button>
      </div>
    </details>
    <div class="outline-block">
      <h4>Timing</h4>${o.timing}
      <h4>Experience Flow</h4>${o.flow}
      <h4>Participant Experience</h4>${o.participant}
      <h4>Companion Artifact</h4>${o.companion}
      <h4>Passport Integration</h4>${o.passport}
    </div>
    <div class="outline-actions">
      <button class="tiny" id="copyAll">Copy Everything</button>
      <button class="tiny" id="downloadAll">Download .txt</button>
    </div>
    <div class="expansions">
      <div id="expGroups"></div>
      <div id="expResults"></div>
    </div>

    card.querySelector("#copyAll").onclick = () => openTextModal("Everything, Copied", fullOutlineToText());
    card.querySelector("#downloadAll").onclick = () => downloadText(c.name.replace(/[^a-z0-9]+/gi,'_') + ".txt", fullOutlineToText());
    card.querySelector("#saveRef").onclick = () => { state.inputs.referenceMaterial = card.querySelector("#editRef").value; persistSession(); };

    const groupBox = card.querySelector("#expGroups");
    let lastGroup = null;
    EXPANSIONS.forEach(exp => {
      if (exp.group !== lastGroup) {
        const gl = document.createElement("div"); gl.className = "group-label"; gl.textContent = exp.group; groupBox.appendChild(gl);
        lastGroup = exp.group;
      }
      const b = document.createElement("button");
      b.className = "secondary";
      b.disabled = state.loading;
      const displayLabel = (exp.key === "facilitator" && state.inputs.format === "recorded") ? "Voice Track Script" : exp.label;
      b.textContent = state.expansions[exp.key] ? "✓ " + displayLabel : displayLabel;
      b.onclick = () => runExpansion(exp);
      groupBox.appendChild(b);
    });

    const resBox = card.querySelector("#expResults");
    Object.keys(state.expansions).forEach(key => {
      const expDef = EXPANSIONS.find(e => e.key === key);
      const r = document.createElement("div"); r.className = "expansion-result";
      r.innerHTML = `<h5>${expDef ? expDef.label : key} <button class="tiny" data-expcopy="${key}">Copy</button></h5>${state.expansions[key]}`;
      resBox.appendChild(r);
    });
    resBox.querySelectorAll("button[data-expcopy]").forEach(btn => {
      btn.onclick = () => openTextModal("Copied", state.expansions[btn.dataset.expcopy].replace(/<br>/g,"\n"));

  if (state.loading) {
    const l = document.createElement("div"); l.className = "loading"; l.innerHTML = `<span class="dot">${state.loadingMsg}</span>`; wrap.appendChild(l);
  }
  return wrap;
}

async function runExpansion(exp) {
  const isRecorded = state.inputs.format === "recorded";
  const displayLabel = (exp.key === "facilitator" && isRecorded) ? "Voice Track Script" : exp.label;
  state.loading = true; state.loadingMsg = `Drafting: ${displayLabel}…`; render();
  const c = state.selectedConcept, o = state.outline;
  const extra = exp.guidance ? `\n\nSpecific guidance for this piece: ${exp.guidance}` : "";
  const recordedNote = (exp.key === "facilitator" && isRecorded)
    ? `\n\nThis is a RECORDED, solo, on-demand experience, not live. Produce a Voice Track Script instead of a Facilitator Guide: the actual words to be spoken and recorded, with fixed pause lengths written into the script itself (e.g. "Take the next thirty seconds with that."), a spoken orientation near the start covering what she'll experience and that she stays in control throughout, and no beats that depend on another person being present. Still use the bracketed placeholder wherever real induction language would go.`
    : "";
  const prompt = `For this experience, produce: ${displayLabel}.

Experience: ${c.name}
Promise: ${c.promise}
Heart: ${c.heart}
Timing: ${o.timing}
Flow: ${o.flow}
Participant experience: ${o.participant}${extra}${recordedNote}

Write only the requested piece, complete and concise, in Tina's voice, no preamble, no placeholders. If this piece would involve an actual hypnotic induction, use the placeholder line instead of writing induction language.`;

  try {
    const result = await callClaude(prompt, (part) => { state.loadingMsg = `Still writing ${displayLabel} (part ${part})…`; render(); });
    state.expansions[exp.key] = result.replace(/\n/g, "<br>");
    state.loading = false; render();
    persistSession();
  } catch (e) {
    state.loading = false;
    alert("Something went wrong with that draft. Try again.");
    render();
  }
}

function renderSessions() {
  const wrap = document.createElement("div");
  const heading = document.createElement("div");
  heading.className = "card";
  heading.innerHTML = `<h2>Your Saved Experiences</h2><p style="font-size:14px;color:var(--ink-soft);margin:0;">Everything you've generated, kept here until you delete it.</p>`;
  wrap.appendChild(heading);

  if (state.sessionsLoading) {
    const l = document.createElement("div"); l.className = "loading"; l.innerHTML = `<span class="dot">Gathering your saved work…</span>`; wrap.appendChild(l);
    return wrap;
  }
  if (!state.savedSessions.length) {
    const e = document.createElement("div"); e.className = "empty"; e.textContent = "Nothing saved yet. Generate your first experience to begin.";
    wrap.appendChild(e); return wrap;
  }
  state.savedSessions.slice().sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0)).forEach(entry => {
    const item = document.createElement("div"); item.className = "session-item";
    const date = new Date(entry.updatedAt || entry.createdAt).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
    item.innerHTML = `
      <div class="meta"><div class="title">${entry.title || "Untitled experience"}</div><div class="date">${date}</div></div>
      <div><button class="secondary" data-open="${entry.id}">Open</button><button class="tiny danger" data-del="${entry.id}">Delete</button></div>
    `;
    wrap.appendChild(item);
  });
  setTimeout(() => {
    wrap.querySelectorAll("button[data-open]").forEach(btn => {
      btn.onclick = async () => {
        const session = await loadSession(btn.dataset.open);
        if (!session) { alert("Couldn't load that one, it may have been removed."); return; }
        state.sessionId = session.id; state.sessionCreatedAt = session.createdAt;
        state.inputs = session.inputs; state.concepts = session.concepts;
        state.selectedConcept = session.selectedConcept; state.outline = session.outline;
        state.expansions = session.expansions || {};
        state.screen = session.outline ? "outline" : (session.concepts ? "concepts" : "form");
        render();
      };
    });
    wrap.querySelectorAll("button[data-del]").forEach(btn => {
      btn.onclick = async () => {
        if (!confirm("Delete this saved experience? This can't be undone.")) return;
        await deleteSessionById(btn.dataset.del);
        openSessions();
      };
    });
  }, 0);
  return wrap;
}

render();
